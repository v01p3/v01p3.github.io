<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="is-preloaded">
  <div id="wrapper" class="fade-in">
    {{ partial "intro.html" . }}
    <header id="header">
      {{ partial "header.html" . }}
    </header>
    <nav id="nav">
      {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
    </nav>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      {{ partial "footer.html" . }}
    </footer>
  </div>
</body>
</html>
